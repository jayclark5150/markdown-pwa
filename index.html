<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <!-- Content Security Policy: restricts where scripts/styles/connections may load from.
       Google sign-in (apis.google.com / accounts.google.com / *.googleapis.com) is explicitly
       allowlisted. If Drive auth ever breaks after a Google-side change, widen the google.com
       entries here rather than removing the policy. -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    script-src 'self' https://cdn.jsdelivr.net https://apis.google.com https://accounts.google.com;
    style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: https:;
    connect-src 'self' https://*.googleapis.com https://accounts.google.com https://login.microsoftonline.com https://graph.microsoft.com https://*.sharepoint.com https://*.1drv.com https://*.microsoftpersonalcontent.com;
    frame-src https://accounts.google.com https://content.googleapis.com https://login.microsoftonline.com;
    manifest-src 'self';
    worker-src 'self';
    base-uri 'self';
    form-action 'none';
  "/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0d1117"/>
  <meta name="description" content="Markdown Editor with Google Drive sync"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="MD Editor"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" type="image/svg+xml" href="icons/icon-64-favicon.svg"/>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png"/>
  <link rel="apple-touch-icon" href="icons/icon-180.png"/>
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png"/>
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png"/>
  <!-- iPad launch images (prevent white flash on startup) -->
  <link rel="apple-touch-startup-image" media="(device-width: 1024px) and (device-height: 1366px) and (orientation: portrait)" href="icons/launch-ipad-portrait.png"/>
  <link rel="apple-touch-startup-image" media="(device-width: 1024px) and (device-height: 1366px) and (orientation: landscape)" href="icons/launch-ipad-landscape.png"/>
  <link rel="apple-touch-startup-image" media="(device-width: 834px) and (device-height: 1194px) and (orientation: portrait)" href="icons/launch-ipad11-portrait.png"/>
  <link rel="apple-touch-startup-image" media="(device-width: 834px) and (device-height: 1194px) and (orientation: landscape)" href="icons/launch-ipad11-landscape.png"/>
  <link rel="apple-touch-startup-image" media="(device-width: 768px) and (device-height: 1024px) and (orientation: portrait)" href="icons/launch-ipad-mini-portrait.png"/>
  <link rel="apple-touch-startup-image" media="(device-width: 768px) and (device-height: 1024px) and (orientation: landscape)" href="icons/launch-ipad-mini-landscape.png"/>
  <link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px)" href="icons/launch-iphone14.png"/>
  <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px)" href="icons/launch-iphone15pro.png"/>
  <title>Markdown Editor</title>

  <!-- Third-party libs: version-pinned with Subresource Integrity (SRI) so a compromised
       CDN cannot serve altered code. crossorigin="anonymous" is required for SRI to apply. -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"
          integrity="sha256-Ffq85bZYmLMrA/XtJen4kacprUwNbYdxEKd0SqhHqJQ="
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"
          integrity="sha256-wIRQlqfEpnQfNirFBslMHH0n3GA7zBv2Slh/dvLb46E="
          crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/styles/github.min.css"
        integrity="sha384-eFTL69TLRZTkNfYZOLM+G04821K1qZao/4QLJbet1pP4tcF+fdXq/9CdqAbWRl/L"
        crossorigin="anonymous"/>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.9.0/highlight.min.js"
          integrity="sha256-g3pvpbDHNrUrveKythkPMF2j/J7UFoHbUyFQcFe1yEY="
          crossorigin="anonymous"></script>
  <!-- Turndown: HTML → Markdown on focus mode exit -->
  <script src="https://cdn.jsdelivr.net/npm/turndown@7.2.0/dist/turndown.js"
          integrity="sha256-rjYF6werkgotGBAIrOaS7FYPps1n0uKR93y8XEMizTg="
          crossorigin="anonymous"></script>
  <!-- Google libraries are continuously updated by Google and do not support SRI;
       they are constrained via the script-src allowlist in the CSP above. -->
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
  <!-- MSAL: Microsoft sign-in for OneDrive sync -->
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.30.0/lib/msal-browser.min.js"
          integrity="sha256-Jz1EazgYFOVjRCJnoHKQT7O3/QFk9KaI7egPDXRWWz4="
          crossorigin="anonymous"></script>
  <!-- Inter typeface -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<!-- Install banner -->
<div id="install-banner">
  <span>📱 Install Markdown Editor as an app for offline use</span>
  <button id="install-btn">Install</button>
  <button id="install-close">✕</button>
</div>

<!-- Find & Replace Bar -->
<div id="find-replace-bar">
  <span class="fr-label">Find:</span>
  <input type="text" id="find-input" placeholder="Search…" autocomplete="off" spellcheck="false"/>
  <span id="match-info"></span>
  <div class="fr-btn-group">
    <button id="find-prev-btn" title="Previous (Shift+Enter)">↑</button>
    <button id="find-next-btn" title="Next (Enter)">↓</button>
  </div>
  <div class="fr-divider"></div>
  <span class="fr-label">Replace:</span>
  <input type="text" id="replace-input" placeholder="Replace with…" autocomplete="off" spellcheck="false"/>
  <div class="fr-btn-group">
    <button id="replace-btn">Replace</button>
    <button id="replace-all-btn">All</button>
  </div>
  <button id="find-close-btn" style="margin-left:8px;">✕</button>
</div>

<!-- Hidden file input for local open fallback (Safari/Firefox) -->
<input type="file" id="local-file-input" accept=".md,.txt" style="display:none"/>

<!-- Hidden legacy elements for JS compat -->
<div hidden aria-hidden="true" id="legacy-compat">
  <button id="drive-signin-btn"></button>
  <button id="drive-open-btn"></button>
  <button id="drive-save-btn"></button>
  <button id="drive-saveas-btn"></button>
  <button id="drive-rename-btn"></button>
  <button id="drive-signout-btn"></button>
  <div id="drive-status"><span class="drive-dot"></span><span id="drive-status-text">Not connected</span></div>
</div>

<!-- Header bar -->
<div id="header-bar">
  <div class="hdr-left">
    <button class="hdr-btn" id="new-btn" title="New Document (Ctrl+N)">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 9 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"/></svg>
    </button>
    <button class="hdr-btn hdr-danger" id="drive-delete-btn" style="display:none" title="Delete from Drive">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
    </button>
    <button class="hdr-btn" id="find-btn" title="Find &amp; Replace (Ctrl+F)">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"/></svg>
    </button>
    <div class="hdr-more-wrap">
      <button class="hdr-btn" id="hdr-more-btn" title="More options">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M8 9a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3ZM1.5 9a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Zm13 0a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"/></svg>
      </button>
      <div class="hdr-dropdown" id="hdr-more-menu">
        <button class="hdr-dd-item" id="hdr-local-open">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Open from Disk
        </button>
        <button class="hdr-dd-item" id="hdr-local-save">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save to Disk
        </button>
        <button class="hdr-dd-item" id="hdr-local-saveas">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save As
        </button>
        <button class="hdr-dd-item" id="hdr-local-rename">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19H4v-3L16.5 3.5z"/></svg>
          Rename
        </button>
        <div class="hdr-dd-sep"></div>
        <button class="hdr-dd-item" id="hdr-drive-connect">
          <svg width="14" height="14" viewBox="0 0 87.3 78"><path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="currentColor"/><path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="currentColor"/><path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" fill="currentColor"/><path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="currentColor"/><path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="currentColor"/><path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 28h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="currentColor"/></svg>
          Connect Google Drive
        </button>
        <button class="hdr-dd-item" id="hdr-open-mobile" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v1"/><path d="M21 15l-3-3-3 3"/><path d="M18 12v9"/></svg>
          Open from Drive
        </button>
        <button class="hdr-dd-item" id="hdr-share-mobile" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Save to Drive
        </button>
        <button class="hdr-dd-item" id="hdr-drive-saveas" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save As
        </button>
        <button class="hdr-dd-item" id="hdr-drive-rename" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19H4v-3L16.5 3.5z"/></svg>
          Rename
        </button>
        <button class="hdr-dd-item hdr-dd-danger" id="hdr-drive-signout" style="display:none">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2.75C2 1.784 2.784 1 3.75 1h2.5a.75.75 0 0 1 0 1.5h-2.5a.25.25 0 0 0-.25.25v10.5c0 .138.112.25.25.25h2.5a.75.75 0 0 1 0 1.5h-2.5A1.75 1.75 0 0 1 2 13.25Zm6.56 4.5h4.69l-1.22-1.22a.75.75 0 1 1 1.06-1.06l2.5 2.5a.75.75 0 0 1 0 1.06l-2.5 2.5a.749.749 0 0 1-1.06-1.06l1.22-1.22H8.56a.75.75 0 0 1 0-1.5Z"/></svg>
          Sign out of Drive
        </button>
        <div class="hdr-dd-sep"></div>
        <button class="hdr-dd-item" id="hdr-onedrive-connect">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19a4.5 4.5 0 0 0 .42-8.98 6 6 0 0 0-11.7 1.62A4.25 4.25 0 0 0 6.75 19Z"/></svg>
          Connect OneDrive
        </button>
        <button class="hdr-dd-item" id="hdr-onedrive-open" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v1"/><path d="M21 15l-3-3-3 3"/><path d="M18 12v9"/></svg>
          Open from OneDrive
        </button>
        <button class="hdr-dd-item" id="hdr-onedrive-save" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Save to OneDrive
        </button>
        <button class="hdr-dd-item" id="hdr-onedrive-saveas" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save As
        </button>
        <button class="hdr-dd-item" id="hdr-onedrive-rename" style="display:none">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19H4v-3L16.5 3.5z"/></svg>
          Rename
        </button>
        <button class="hdr-dd-item hdr-dd-danger" id="hdr-onedrive-signout" style="display:none">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2.75C2 1.784 2.784 1 3.75 1h2.5a.75.75 0 0 1 0 1.5h-2.5a.25.25 0 0 0-.25.25v10.5c0 .138.112.25.25.25h2.5a.75.75 0 0 1 0 1.5h-2.5A1.75 1.75 0 0 1 2 13.25Zm6.56 4.5h4.69l-1.22-1.22a.75.75 0 1 1 1.06-1.06l2.5 2.5a.75.75 0 0 1 0 1.06l-2.5 2.5a.749.749 0 0 1-1.06-1.06l1.22-1.22H8.56a.75.75 0 0 1 0-1.5Z"/></svg>
          Sign out of OneDrive
        </button>
        <div class="hdr-dd-sep"></div>
        <button class="hdr-dd-item hdr-dd-danger" id="hdr-focus-mode">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
          Focus Mode (F11)
        </button>
      </div>
    </div>
  </div>

  <div class="hdr-center">
    <svg class="hdr-doc-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 9 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"/></svg>
    <span id="tb-title">New Document</span>
    <input id="title-input" type="text" placeholder="filename.md" spellcheck="false"/>
  </div>

  <div class="hdr-right">
    <button class="hdr-btn" id="focus-btn" title="Focus Mode (F11)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
    </button>
  </div>
</div>

<!-- Format bar -->
<div id="format-bar">
  <button class="fmt-btn fmt-bold" id="fmt-bold-btn" title="Bold (Ctrl+B)"><b>B</b></button>
  <button class="fmt-btn fmt-italic" id="fmt-italic-btn" title="Italic (Ctrl+I)"><i>I</i></button>
  <button class="fmt-btn fmt-strike" id="fmt-strike-btn" title="Strikethrough"><s>S</s></button>
  <div class="fmt-split-btn">
    <button class="fmt-btn fmt-h-label" id="fmt-heading-btn" title="Heading">H1</button>
    <button class="fmt-btn fmt-dd-arrow" id="fmt-heading-dd" title="Choose heading level">
      <svg width="9" height="9" viewBox="0 0 16 16" fill="currentColor"><path d="M4.427 7.427l3.396 3.396a.25.25 0 0 0 .354 0l3.396-3.396A.25.25 0 0 0 11.396 7H4.604a.25.25 0 0 0-.177.427z"/></svg>
    </button>
    <div class="fmt-dropdown" id="fmt-heading-menu">
      <button class="fmt-dd-item" data-level="1">H1 — Heading 1</button>
      <button class="fmt-dd-item" data-level="2">H2 — Heading 2</button>
      <button class="fmt-dd-item" data-level="3">H3 — Heading 3</button>
      <button class="fmt-dd-item" data-level="4">H4 — Heading 4</button>
      <button class="fmt-dd-item" data-level="5">H5 — Heading 5</button>
      <button class="fmt-dd-item" data-level="6">H6 — Heading 6</button>
    </div>
  </div>
  <div class="fmt-sep"></div>
  <button class="fmt-btn" id="fmt-ul-btn" title="Bullet List">
    <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M2 4a1 1 0 1 1 0-2 1 1 0 0 1 0 2Zm3.75-1.5a.75.75 0 0 0 0 1.5h8.5a.75.75 0 0 0 0-1.5h-8.5Zm0 5a.75.75 0 0 0 0 1.5h8.5a.75.75 0 0 0 0-1.5h-8.5Zm0 5a.75.75 0 0 0 0 1.5h8.5a.75.75 0 0 0 0-1.5h-8.5ZM3 7.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM2 14a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"/></svg>
  </button>
  <button class="fmt-btn" id="fmt-ol-btn" title="Ordered List">

    </button>
    <span class="tw-tip" id="theme-tip">Theme: Lokai</span>
  </div>
  <div class="fmt-sep"></div>
  <div class="tw">
    <div id="toolbar-drive-dot"></div>
    <span class="tw-tip" id="toolbar-drive-tip">Not connected to Drive</span>

<!-- Main content -->
<div id="main-content">

  <!-- Editor: line numbers + textarea -->
  <div id="editor-pane">
    <div id="line-numbers">1</div>
    <textarea id="editor" spellcheck="false" placeholder="Start typing your markdown…&#10;&#10;# Hello World"></textarea>
  </div>

  <!-- Resizable divider -->
  <div id="divider"></div>

  <!-- Preview wrapper: content + zoom overlay -->
  <div id="preview-wrapper">
    <div id="preview-pane"><div id="preview-inner"></div></div>
    <div class="zoom-controls">
      <button id="zoom-out-btn" title="Zoom Out (Ctrl+-)">−</button>
      <span id="zoom-pct">100%</span>
      <button id="zoom-in-btn"  title="Zoom In (Ctrl++)">+</button>
      <button id="zoom-reset-btn" title="Reset Zoom">⊙</button>
    </div>
  </div>

</div><!-- /#main-content -->

<!-- Status bar -->
<div id="statusbar">
  <span id="app-version">v2.1.3</span>
  <span id="word-count">Words: 0</span>
  <span id="char-count">Chars: 0</span>
  <span id="cursor-pos">Ln 1, Col 1</span>
  <span style="flex:1"></span>
  <span id="save-status"></span>
  <span id="drive-file-info"></span>
</div>

<!-- Drive file picker modal -->
<div id="drive-modal" class="modal-backdrop">
  <div class="modal">
    <div class="modal-title" id="cloud-modal-title">📂 Open from Google Drive</div>
    <input type="text" class="modal-search" id="drive-search" placeholder="Search files…"/>
    <div class="file-list" id="drive-file-list">
      <div class="file-item" style="color:var(--text2);cursor:default">Loading files…</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="drive-modal-cancel">Cancel</button>
      <button class="btn btn-primary"   id="drive-modal-open">Open</button>
    </div>
  </div>
</div>

<!-- New file modal -->
<div id="new-modal" class="modal-backdrop">
  <div class="modal" style="width:380px">
    <div class="modal-title">New Document</div>
    <div>
      <label class="modal-label">Filename</label>
      <input type="text" class="modal-input" id="new-filename" placeholder="my-document.md" spellcheck="false"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="new-modal-cancel">Cancel</button>
      <button class="btn btn-primary"   id="new-modal-ok">Create</button>
    </div>
  </div>
</div>

<!-- Drive Save As / Rename Modal -->
<div id="drive-action-modal" class="modal-backdrop">
  <div class="modal" style="width:380px">
    <div class="modal-title" id="drive-action-title">Save As</div>
    <input type="text" class="modal-input" id="drive-action-input" placeholder="New filename" spellcheck="false"/>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="drive-action-cancel">Cancel</button>
      <button class="btn btn-primary" id="drive-action-confirm">Confirm</button>
    </div>
  </div>
</div>

<!-- Focus Mode Overlay (WYSIWYG) -->
<div id="focus-overlay">
  <div id="focus-wysiwyg" contenteditable="true" spellcheck="true"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Focus mode exit button (only visible in focus mode) -->
<button id="focus-exit-btn">✕ Exit Focus</button>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
